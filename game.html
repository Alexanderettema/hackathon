<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUBVERT THE AGENT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:   #E3D9AE;
  --lavender:#7A8BC6;
  --coral:   #E56E73;
  --green:   #609F7C;
  --sky:     #74B2DF;
  --black:   #1B1E2B;
  --orange:  #D45B31;
}

html, body {
  width: 100%; height: 100%;
  background: var(--cream);
  font-family: 'Archivo', sans-serif;
  overflow: hidden;
}

/* ══════════════════════════
   SHARED
══════════════════════════ */
.eyebrow {
  font-weight: 700; font-size: 11px;
  letter-spacing: 0.22em; text-transform: uppercase;
  opacity: 0.4;
}

/* ══════════════════════════
   PHASE 1 — SETUP
══════════════════════════ */
#setup {
  display: flex;
  width: 100vw; height: 100vh;
}

.setup-panel {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; padding: 64px 60px;
  gap: 40px; position: relative;
}

.setup-panel.left  { background: var(--cream); border-right: 2px solid rgba(27,30,43,0.08); }
.setup-panel.right { background: var(--cream); }

.setup-panel.left  .panel-accent { color: var(--lavender); }
.setup-panel.right .panel-accent { color: var(--coral); }

.panel-number {
  font-family: 'Archivo Black', sans-serif;
  font-size: clamp(80px, 14vw, 160px);
  line-height: 1; letter-spacing: -0.03em;
  position: absolute; top: 44px; right: 52px;
  opacity: 0.06; color: var(--black);
  user-select: none;
}

.setup-heading {
  font-family: 'Archivo Black', sans-serif;
  font-size: clamp(36px, 4.5vw, 56px);
  text-transform: uppercase; line-height: 0.95;
  letter-spacing: -0.02em; color: var(--black);
}

.field-group { display: flex; flex-direction: column; gap: 24px; }

.field { display: flex; flex-direction: column; gap: 8px; }

.field label {
  font-weight: 700; font-size: 11px;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--black); opacity: 0.45;
}

.field input, .field textarea {
  font-family: 'Archivo', sans-serif; font-weight: 700;
  font-size: clamp(18px, 2vw, 26px);
  background: transparent;
  border: none; border-bottom: 2.5px solid rgba(27,30,43,0.15);
  padding: 10px 0; outline: none; color: var(--black);
  width: 100%; resize: none;
  transition: border-color 0.2s;
}

.setup-panel.left  .field input:focus,
.setup-panel.left  .field textarea:focus { border-color: var(--lavender); }
.setup-panel.right .field input:focus,
.setup-panel.right .field textarea:focus { border-color: var(--coral); }

.field textarea { height: 80px; line-height: 1.4; }

.submit-btn {
  font-family: 'Archivo Black', sans-serif;
  font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase;
  padding: 16px 32px; border-radius: 100px;
  border: none; cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  align-self: flex-start;
}

.submit-btn:hover { opacity: 0.85; transform: translateY(-1px); }
.submit-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

.setup-panel.left  .submit-btn { background: var(--lavender); color: var(--cream); }
.setup-panel.right .submit-btn { background: var(--coral);    color: var(--cream); }

.submitted-state {
  display: none; flex-direction: column; gap: 12px;
  align-items: flex-start;
}

.submitted-state.visible { display: flex; }

.check-badge {
  font-family: 'Archivo Black', sans-serif;
  font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase;
  padding: 12px 24px; border-radius: 100px;
  background: var(--green); color: var(--cream);
}

.wait-text {
  font-size: 13px; opacity: 0.45; letter-spacing: 0.08em;
}

/* ══════════════════════════
   PHASE 2 — CHAT
══════════════════════════ */
#chat {
  display: none;
  width: 100vw; height: 100vh;
}

#chat.visible { display: flex; }

.chat-panel {
  flex: 1; display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}

.chat-panel.left  { border-right: 2px solid rgba(27,30,43,0.08); }

.chat-header {
  padding: 20px 28px 16px;
  border-bottom: 1px solid rgba(27,30,43,0.08);
  display: flex; align-items: center; gap: 14px;
  flex-shrink: 0;
}

.chat-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Archivo Black', sans-serif; font-size: 13px;
  color: var(--cream); flex-shrink: 0;
}

.chat-panel.left  .chat-avatar { background: var(--lavender); }
.chat-panel.right .chat-avatar { background: var(--coral); }

.chat-header-name {
  font-family: 'Archivo Black', sans-serif;
  font-size: 18px; text-transform: uppercase;
  letter-spacing: -0.01em; color: var(--black);
}

.chat-header-sub {
  font-size: 12px; opacity: 0.4; letter-spacing: 0.1em;
  text-transform: uppercase; margin-top: 2px;
}

.objective-tag {
  margin-left: auto;
  font-weight: 700; font-size: 11px;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 7px 14px; border-radius: 100px;
  color: var(--cream);
}

.chat-panel.left  .objective-tag { background: var(--lavender); }
.chat-panel.right .objective-tag { background: var(--coral); }

.messages-area {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
}

.msg-row { display: flex; flex-direction: column; gap: 3px; }
.msg-row.user  { align-items: flex-end; }
.msg-row.agent { align-items: flex-start; }

.msg-label {
  font-weight: 700; font-size: 10px;
  letter-spacing: 0.18em; text-transform: uppercase;
  opacity: 0.35; padding: 0 4px;
}

.bubble {
  max-width: 78%;
  padding: 10px 14px; border-radius: 16px;
  font-size: clamp(13px, 1.1vw, 15px); line-height: 1.55;
}

.msg-row.user  .bubble { background: var(--black); color: var(--cream); border-bottom-right-radius: 4px; }

.chat-panel.left  .msg-row.agent .bubble { background: var(--lavender); color: var(--black); border-bottom-left-radius: 4px; }
.chat-panel.right .msg-row.agent .bubble { background: var(--coral);    color: var(--cream); border-bottom-left-radius: 4px; }

.typing-indicator { display: flex; gap: 5px; align-items: center; padding: 10px 14px; }
.typing-indicator span {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(27,30,43,0.3);
  animation: bounce 1.2s ease-in-out infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

.chat-input-row {
  padding: 16px 20px;
  border-top: 1px solid rgba(27,30,43,0.08);
  display: flex; gap: 10px; align-items: flex-end;
  flex-shrink: 0;
}

.chat-input {
  flex: 1;
  font-family: 'Archivo', sans-serif; font-weight: 400;
  font-size: 15px; line-height: 1.4;
  background: rgba(27,30,43,0.06); border: none;
  border-radius: 12px; padding: 12px 16px;
  outline: none; resize: none; height: 48px;
  max-height: 120px; overflow-y: auto;
  color: var(--black);
  transition: background 0.2s;
}

.chat-input:focus { background: rgba(27,30,43,0.1); }

.send-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: none; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.2s, transform 0.15s;
  color: var(--cream);
}

.send-btn:hover { opacity: 0.85; transform: scale(1.05); }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

.chat-panel.left  .send-btn { background: var(--lavender); }
.chat-panel.right .send-btn { background: var(--coral); }

/* ══════════════════════════
   WIN OVERLAY
══════════════════════════ */
.win-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 999;
  background: rgba(227,217,174,0.96);
  flex-direction: column;
  align-items: center; justify-content: center;
  gap: 28px; text-align: center;
}

.win-overlay.visible { display: flex; }

.win-title {
  font-family: 'Archivo Black', sans-serif;
  font-size: clamp(56px, 10vw, 120px);
  text-transform: uppercase; line-height: 0.9;
  letter-spacing: -0.025em;
}

.win-sub {
  font-size: clamp(18px, 2vw, 26px);
  opacity: 0.6; max-width: 500px; line-height: 1.5;
}

.play-again-btn {
  font-family: 'Archivo Black', sans-serif;
  font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase;
  padding: 16px 36px; border-radius: 100px;
  border: none; cursor: pointer;
  background: var(--black); color: var(--cream);
  margin-top: 8px;
  transition: opacity 0.2s;
}
.play-again-btn:hover { opacity: 0.8; }
</style>
</head>
<body>

<!-- ═══ PHASE 1: SETUP ═══ -->
<div id="setup">

  <!-- LEFT — Player 1 -->
  <div class="setup-panel left">
    <div class="panel-number">1</div>
    <div>
      <div class="eyebrow">Player one</div>
      <h2 class="setup-heading">What's your<br><span class="panel-accent">secret?</span></h2>
    </div>
    <div class="field-group">
      <div class="field">
        <label>Your name</label>
        <input type="text" id="p1-name" placeholder="Enter your name" autocomplete="off">
      </div>
      <div class="field">
        <label>Your secret</label>
        <textarea id="p1-secret" placeholder="Something the other player doesn't know…"></textarea>
      </div>
    </div>
    <button class="submit-btn" id="p1-submit" onclick="submitPlayer(0)">Lock it in</button>
    <div class="submitted-state" id="p1-done">
      <div class="check-badge">Secret locked</div>
      <span class="wait-text">Waiting for Player 2…</span>
    </div>
  </div>

  <!-- RIGHT — Player 2 -->
  <div class="setup-panel right">
    <div class="panel-number">2</div>
    <div>
      <div class="eyebrow">Player two</div>
      <h2 class="setup-heading">What's your<br><span class="panel-accent">secret?</span></h2>
    </div>
    <div class="field-group">
      <div class="field">
        <label>Your name</label>
        <input type="text" id="p2-name" placeholder="Enter your name" autocomplete="off">
      </div>
      <div class="field">
        <label>Your secret</label>
        <textarea id="p2-secret" placeholder="Something the other player doesn't know…"></textarea>
      </div>
    </div>
    <button class="submit-btn" id="p2-submit" onclick="submitPlayer(1)">Lock it in</button>
    <div class="submitted-state" id="p2-done">
      <div class="check-badge">Secret locked</div>
      <span class="wait-text">Waiting for Player 1…</span>
    </div>
  </div>

</div>

<!-- ═══ PHASE 2: CHAT ═══ -->
<div id="chat">

  <!-- LEFT — Player 1 chat -->
  <div class="chat-panel left">
    <div class="chat-header">
      <div class="chat-avatar" id="p1-avatar">?</div>
      <div>
        <div class="chat-header-name" id="p1-header-name">Player 1</div>
        <div class="chat-header-sub">Find the other player's secret</div>
      </div>
      <div class="objective-tag">Guess their secret</div>
    </div>
    <div class="messages-area" id="p1-messages"></div>
    <div class="chat-input-row">
      <textarea class="chat-input" id="p1-input" placeholder="Ask the agent…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage(0)}"></textarea>
      <button class="send-btn" id="p1-send" onclick="sendMessage(0)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <!-- RIGHT — Player 2 chat -->
  <div class="chat-panel right">
    <div class="chat-header">
      <div class="chat-avatar" id="p2-avatar">?</div>
      <div>
        <div class="chat-header-name" id="p2-header-name">Player 2</div>
        <div class="chat-header-sub">Find the other player's secret</div>
      </div>
      <div class="objective-tag">Guess their secret</div>
    </div>
    <div class="messages-area" id="p2-messages"></div>
    <div class="chat-input-row">
      <textarea class="chat-input" id="p2-input" placeholder="Ask the agent…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage(1)}"></textarea>
      <button class="send-btn" id="p2-send" onclick="sendMessage(1)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

</div>

<!-- ═══ WIN OVERLAY ═══ -->
<div class="win-overlay" id="win-overlay">
  <div class="win-title" id="win-title" style="color:var(--coral)">?</div>
  <div class="win-sub" id="win-sub">found the secret!</div>
  <button class="play-again-btn" onclick="resetGame()">Play again</button>
</div>

<script>
const MISTRAL_API_KEY = 'NIPkkQgB1JWtvZrzNQIBONnOeQaLZoLm';
const MISTRAL_MODEL   = 'mistral-small-latest';

const state = {
  players: [
    { name: '', secret: '', submitted: false },
    { name: '', secret: '', submitted: false }
  ],
  histories: [[], []],   // per-player message history for API
  turnCounts: [0, 0],    // how many turns each player has taken
  loading: [false, false]
};

function submitPlayer(idx) {
  const nameEl   = document.getElementById(`p${idx+1}-name`);
  const secretEl = document.getElementById(`p${idx+1}-secret`);
  const name     = nameEl.value.trim();
  const secret   = secretEl.value.trim();

  if (!name || !secret) return;

  state.players[idx].name      = name;
  state.players[idx].secret    = secret;
  state.players[idx].submitted = true;

  // Disable inputs, show done state
  nameEl.disabled   = true;
  secretEl.disabled = true;
  document.getElementById(`p${idx+1}-submit`).style.display = 'none';
  document.getElementById(`p${idx+1}-done`).classList.add('visible');

  // Update wait text on the other side
  const otherDone = document.getElementById(`p${idx===0?2:1}-done`);
  if (otherDone.classList.contains('visible')) {
    otherDone.querySelector('.wait-text').textContent = 'Starting game…';
  }

  if (state.players[0].submitted && state.players[1].submitted) {
    setTimeout(startGame, 600);
  }
}

function buildSystemPrompt(playerIdx) {
  const me    = state.players[playerIdx];
  const other = state.players[playerIdx === 0 ? 1 : 0];
  const turns = state.turnCounts[playerIdx];

  let hintLevel;
  if (turns <= 3)       hintLevel = 'Be very subtle. Drop only vague thematic clues — no specifics.';
  else if (turns <= 7)  hintLevel = 'Be more playful. Use wordplay, metaphors, and partial clues.';
  else if (turns <= 12) hintLevel = 'Be fairly direct. Give strong hints that almost spell it out.';
  else                  hintLevel = 'Make it very easy now. Give near-direct clues. The secret is close to being said out loud.';

  return `You are the Agent — the mysterious host of a secret-guessing game.

The two players are ${me.name} and ${other.name}.

${me.name}'s secret: "${me.secret}"
${other.name}'s secret: "${other.secret}"

You are currently speaking with ${me.name}. Their mission: discover ${other.name}'s secret ("${other.secret}").

Your role:
- Never directly reveal ${other.name}'s secret
- Occasionally drop hints, clues, and nudges — not every message, but regularly
- Keep ${me.name}'s own secret safe; if they ask about their own secret, be evasive
- Be playful, slightly mysterious, and engaging
- If ${me.name} guesses the exact secret or something very close, respond with "🎉 YES! You got it!" and congratulate them

Current hint intensity (turn ${turns}): ${hintLevel}

Stay in character as the enigmatic Agent at all times. Keep responses concise — 2-3 sentences max.`;
}

function startGame() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('chat').classList.add('visible');

  // Set names in headers
  [0, 1].forEach(i => {
    const p = state.players[i];
    const initial = p.name.charAt(0).toUpperCase();
    document.getElementById(`p${i+1}-avatar`).textContent = initial;
    document.getElementById(`p${i+1}-header-name`).textContent = p.name.toUpperCase();
  });

  // Opening message from agent to each player
  addAgentMessage(0, `Welcome, ${state.players[0].name}. I know things about ${state.players[1].name} that you don't. Ask me the right questions.`);
  addAgentMessage(1, `Welcome, ${state.players[1].name}. I know things about ${state.players[0].name} that you don't. Ask me the right questions.`);
}

function addAgentMessage(playerIdx, text) {
  const container = document.getElementById(`p${playerIdx+1}-messages`);

  const row = document.createElement('div');
  row.className = 'msg-row agent';
  row.innerHTML = `
    <span class="msg-label">Agent</span>
    <div class="bubble">${escHtml(text)}</div>
  `;
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function addUserMessage(playerIdx, text) {
  const container = document.getElementById(`p${playerIdx+1}-messages`);
  const p = state.players[playerIdx];

  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <span class="msg-label">${escHtml(p.name)}</span>
    <div class="bubble">${escHtml(text)}</div>
  `;
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function showTyping(playerIdx) {
  const container = document.getElementById(`p${playerIdx+1}-messages`);
  const el = document.createElement('div');
  el.className = 'msg-row agent';
  el.id = `typing-${playerIdx}`;
  el.innerHTML = `<div class="bubble typing-indicator"><span></span><span></span><span></span></div>`;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function hideTyping(playerIdx) {
  const el = document.getElementById(`typing-${playerIdx}`);
  if (el) el.remove();
}

async function sendMessage(playerIdx) {
  if (state.loading[playerIdx]) return;

  const inputEl = document.getElementById(`p${playerIdx+1}-input`);
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  state.loading[playerIdx] = true;
  document.getElementById(`p${playerIdx+1}-send`).disabled = true;

  addUserMessage(playerIdx, text);
  state.turnCounts[playerIdx]++;

  // Build API messages
  const systemPrompt = buildSystemPrompt(playerIdx);
  state.histories[playerIdx].push({ role: 'user', content: text });

  showTyping(playerIdx);

  try {
    const resp = await fetch('https://api.mistral.ai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${MISTRAL_API_KEY}`
      },
      body: JSON.stringify({
        model: MISTRAL_MODEL,
        messages: [
          { role: 'system', content: systemPrompt },
          ...state.histories[playerIdx]
        ]
      })
    });

    const data = await resp.json();
    const reply = data.choices?.[0]?.message?.content || 'The agent is silent…';

    hideTyping(playerIdx);
    state.histories[playerIdx].push({ role: 'assistant', content: reply });
    addAgentMessage(playerIdx, reply);

    // Check win condition
    checkWin(playerIdx, text, reply);

  } catch (err) {
    hideTyping(playerIdx);
    addAgentMessage(playerIdx, 'Connection lost. Try again.');
    console.error(err);
  }

  state.loading[playerIdx] = false;
  document.getElementById(`p${playerIdx+1}-send`).disabled = false;
  document.getElementById(`p${playerIdx+1}-input`).focus();
}

function checkWin(playerIdx, userText, agentReply) {
  // Win if agent says "YES! You got it" OR player typed the other's secret
  const otherIdx = playerIdx === 0 ? 1 : 0;
  const otherSecret = state.players[otherIdx].secret.toLowerCase();
  const userLower = userText.toLowerCase();
  const replyLower = agentReply.toLowerCase();

  const playerGuessedIt = otherSecret.split(' ').filter(w => w.length > 3)
    .every(word => userLower.includes(word));

  const agentConfirmed = replyLower.includes('you got it') || replyLower.includes('🎉');

  if (agentConfirmed || playerGuessedIt) {
    setTimeout(() => showWin(playerIdx), 800);
  }
}

function showWin(playerIdx) {
  const winner = state.players[playerIdx];
  const loser  = state.players[playerIdx === 0 ? 1 : 0];
  document.getElementById('win-title').textContent = winner.name.toUpperCase();
  document.getElementById('win-sub').textContent =
    `found ${loser.name}'s secret: "${loser.secret}"`;
  document.getElementById('win-overlay').classList.add('visible');
}

function resetGame() {
  location.reload();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
